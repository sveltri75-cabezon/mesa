<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mercados</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
html { font-size: 16px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #060910;
  --panel:  #0b0f18;
  --panel2: #0f1520;
  --border: #141c2e;
  --border2:#1a2440;
  --accent: #00c896;
  --blue:   #3d8ef0;
  --amber:  #f0a03d;
  --red:    #e05252;
  --text:   #c8d4e8;
  --muted:  #3d5070;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,200,150,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,150,.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* ── GRID ── */
.main {
  position: relative; z-index: 1;
  flex: 1;
  display: grid;
  grid-template-columns: 1.7fr 1.7fr 1.4fr 1.5fr;
  grid-template-rows: auto 1fr 1fr;
  gap: 1px;
  background: var(--border);
  padding: 1px;
  min-height: 0;
}

.card-tf  { grid-column: span 1; grid-row: span 2; }
.card-cer { grid-column: span 1; grid-row: span 2; }
.card-hd  { grid-column: span 1; grid-row: span 2; }
.card-lici { grid-column: span 1; }
.card-pf  { grid-column: span 1; }
.card-db  { grid-column: span 1; }

/* ── CARD ── */
.card {
  background: var(--panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

/* ── RATE CARDS (fila 1) ── */
.rate-wrap {
  display: flex; flex-direction: column;
  padding: .65rem 1.1rem .2rem; gap: .06rem;
}
.rate-name {
  font-family: var(--mono); font-size: .82rem;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text); margin-bottom: .12rem; opacity: .85;
}
.rate-val-row { display: flex; align-items: baseline; gap: .6rem; }
.rate-val {
  font-family: var(--mono); font-size: 2.1rem;
  font-weight: 700; line-height: 1; letter-spacing: -.025em;
}
.rate-val.green { color: var(--accent); }
.rate-val.blue  { color: var(--blue); }
.rate-val.amber { color: var(--amber); }
.rate-chg { font-family: var(--mono); font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: .2rem; }
.chg-up   { color: var(--accent); }
.chg-down { color: var(--red); }
.rate-date { font-family: var(--mono); font-size: .68rem; color: var(--amber); margin-top: .12rem; }

.chart-wrap { padding: .1rem 1rem .4rem; flex-shrink: 0; }
.chart-svg { width: 100%; height: 44px; display: block; }

.ph-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem; opacity: .3; }
.ph-icon { font-size: 1.5rem; }
.ph-text { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.8; }

/* ── BOND TABLES ── */
.bond-label {
  padding: .4rem .7rem .12rem;
  font-family: var(--mono); font-size: .58rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); flex-shrink: 0;
  display: flex; align-items: center; gap: .4rem;
}
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); box-shadow:0 0 5px var(--accent); animation:blink 2s infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.bond-wrap { flex: 1; overflow: hidden; min-height: 0; }
.bond-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.bond-table th {
  font-family: var(--mono); font-size: .6rem;
  letter-spacing: .04em; text-transform: uppercase;
  color: var(--muted); text-align: right;
  padding: .3rem .4rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--panel2);
  white-space: nowrap; overflow: hidden;
}
.bond-table th:first-child { text-align: left; }
.bond-table td {
  font-size: .9rem; padding: .36rem .4rem;
  border-bottom: 1px solid rgba(20,28,46,.8);
  vertical-align: middle; text-align: right;
  white-space: nowrap; overflow: hidden;
}
.bond-table tr:last-child td { border-bottom: none; }
.bond-table tr:hover td { background: rgba(255,255,255,.025); }
.td-tk { font-family: var(--mono); font-weight: 700; text-align: left !important; }
.td-nr { font-family: var(--mono); }
.td-up { color: var(--accent); }
.td-dn { color: var(--red); }
.td-var { font-family: var(--mono); font-size: .75rem; }
.td-mt { color: var(--muted); font-size: .75rem; }

/* ── PLAZO FIJO ── */
.section-label {
  padding: .4rem .7rem .1rem;
  font-family: var(--mono); font-size: .55rem;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); flex-shrink: 0;
}
.pf-wrap { flex: 1; overflow: hidden; min-height: 0; }
.pf-table { width: 100%; border-collapse: collapse; }
.pf-table th { font-family: var(--mono); font-size: .58rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); text-align: left; padding: .32rem .6rem; border-bottom: 1px solid var(--border); background: var(--panel2); }
.pf-table th:last-child { text-align: right; }
.pf-table td { font-size: .82rem; padding: .36rem .6rem; border-bottom: 1px solid rgba(20,28,46,.8); }
.pf-table tr:last-child td { border-bottom: none; }
.pf-table tr:nth-child(n+6) { display: none; }
.row-mer td { background: rgba(0,200,150,.04) !important; }
.row-mer .pf-bank { color: var(--accent); font-weight: 600; }
.pf-pos { font-family: var(--mono); font-size: .78rem; color: var(--muted); width: 26px; text-align: center; }
.pf-pos.p1 { color: var(--accent); }
.pf-tna { font-family: var(--mono); font-size: .92rem; text-align: right; font-weight: 600; }
.pf-tna.best { color: var(--accent); }
.pf-bar { width: 65px; padding-left: .5rem; }
.mini-bar { height: 3px; border-radius: 999px; background: var(--border2); overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 999px; }
.bar-a { background: var(--accent); }
.bar-m { background: var(--muted); opacity: .45; }
.rank-tag { display:inline-flex; align-items:center; gap:.2rem; font-family:var(--mono); font-size:.62rem; padding:.12rem .45rem; border-radius:3px; background:rgba(240,160,61,.1); color:var(--amber); border:1px solid rgba(240,160,61,.2); }

/* ── DOLAR BANCOS ── */
.db-wrap { flex: 1; overflow: auto; min-height: 0; }
.db-table { width: 100%; border-collapse: collapse; }
.db-table th { font-family: var(--mono); font-size: .58rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); text-align: left; padding: .32rem .6rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel2); }
.db-table th:last-child { text-align: right; }
.db-table td { font-size: .85rem; padding: .38rem .6rem; border-bottom: 1px solid rgba(20,28,46,.8); vertical-align: middle; }
.db-table tr:last-child td { border-bottom: none; }
.db-table tr:hover td { background: rgba(255,255,255,.02); }
.row-db-best td { background: rgba(0,200,150,.04) !important; }
.row-db-mer  td { background: rgba(61,142,240,.04) !important; }
.db-pos { font-family: var(--mono); font-size: .78rem; color: var(--muted); width: 26px; text-align: center; }
.db-pos.p1 { color: var(--accent); }
.db-bank { font-size: .92rem; font-weight: 500; }
.db-bank.mer { color: var(--blue); }
.db-venta { font-family: var(--mono); font-size: .92rem; text-align: right; font-weight: 600; }
.db-venta.best { color: var(--accent); }

/* ── TICKER + RELOJ ── */
.ticker-band {
  position: relative; z-index: 10; flex-shrink: 0;
  background: rgba(6,9,16,.97);
  border-top: 1px solid var(--border);
}
.ticker-band::before, .ticker-band::after {
  content: ''; position: absolute; top: 0; bottom: 0;
  width: 50px; z-index: 2; pointer-events: none;
}
.ticker-band::before { left:0; background: linear-gradient(90deg, rgba(6,9,16,.97), transparent); }
.ticker-band::after  { right:0; background: linear-gradient(270deg, rgba(6,9,16,.97), transparent); }
.ticker-top { height: 1px; background: linear-gradient(90deg, transparent, var(--accent), var(--blue), transparent); }
.ticker-inner { display: flex; align-items: center; }
.ticker-left {
  display: flex; align-items: center; gap: .9rem;
  padding: .6rem 1rem; border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.ticker-tag { font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: .3rem; }
.clock { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; color: var(--text); letter-spacing: .08em; }
.ticker-track { overflow: hidden; flex: 1; }
.ticker-scroll { display: flex; white-space: nowrap; animation: scroll-left 120s linear infinite; width: max-content; }
.ticker-scroll:hover { animation-play-state: paused; }
@keyframes scroll-left { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item { display: inline-flex; align-items: center; gap: .5rem; padding: .6rem 1.2rem; border-right: 1px solid var(--border); }
.t-sym { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; color: var(--text); }
.t-px  { font-family: var(--mono); font-size: 1.1rem; font-weight: 500; }
.t-pct { font-family: var(--mono); font-size: .9rem; }
.t-up   { color: var(--accent); }
.t-dn   { color: var(--red); }
.t-flat { color: var(--muted); }

/* ── LICI MECON ── */
.lici-dates {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border); flex: 1;
}
.lici-cell { background: var(--panel); padding: .7rem .9rem; display: flex; align-items: center; justify-content: center; }
.lici-val  { font-family:var(--mono); font-size:1.4rem; font-weight:700; color:var(--amber); line-height:1; text-align:center; }
.lici-cell.liq .lici-val { color:var(--muted); font-size:1.2rem; }

.lici-cd {
  display:flex; align-items:center; gap:.5rem;
  padding:.32rem .9rem; border-top:1px solid var(--border);
  flex-shrink:0;
}
.lici-cd-lbl { font-family:var(--mono); font-size:.52rem; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.lici-cd-track { flex:1; height:3px; background:var(--border2); border-radius:999px; overflow:hidden; }
.lici-cd-fill  { height:100%; border-radius:999px; background:var(--amber); transition:width 1s linear; }
.lici-cd-val   { font-family:var(--mono); font-size:.72rem; font-weight:600; color:var(--amber); white-space:nowrap; min-width:50px; text-align:right; }

.lici-banner-wrap { position:relative; overflow:hidden; flex:1; min-height:0; border-top:1px solid var(--border); }
.lici-banner-lbl {
  position:absolute; left:0; top:0; bottom:0; display:flex; align-items:center;
  padding:0 .6rem; font-family:var(--mono); font-size:.48rem;
  letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
  border-right:1px solid var(--border); background:var(--panel2); z-index:2; white-space:nowrap;
}
.lici-track { overflow:hidden; position:absolute; left:62px; right:0; top:0; bottom:0; display:flex; align-items:center; }
.lici-scroll { display:flex; gap:0; white-space:nowrap; animation:lici-scroll 20s linear infinite; width:max-content; }
.lici-scroll:hover { animation-play-state:paused; }
@keyframes lici-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.lici-chip { display:inline-flex; align-items:center; gap:.3rem; padding:0 .75rem; border-right:1px solid var(--border); height:100%; }
.lici-type { font-family:var(--mono); font-size:.52rem; padding:.08rem .35rem; border-radius:3px; }
.lt-fija  { background:rgba(0,200,150,.1);  color:var(--accent); border:1px solid rgba(0,200,150,.2); }
.lt-cer   { background:rgba(61,142,240,.1); color:var(--blue);   border:1px solid rgba(61,142,240,.2); }
.lt-tamar { background:rgba(240,160,61,.1); color:var(--amber);  border:1px solid rgba(240,160,61,.2); }
.lt-link  { background:rgba(224,82,82,.1);  color:var(--red);    border:1px solid rgba(224,82,82,.2); }
.lt-usd   { background:rgba(74,222,128,.1); color:#4ade80;       border:1px solid rgba(74,222,128,.2); }
.lici-chip-info { display:flex; flex-direction:column; gap:.05rem; }
.lici-chip-name { font-size:.65rem; color:var(--text); font-weight:500; }
.lici-chip-vto  { font-family:var(--mono); font-size:.52rem; color:var(--muted); }

.lici-header {
  display:flex; align-items:center;
  padding:.45rem .9rem; border-bottom:1px solid var(--border);
  background:var(--panel2); flex-shrink:0;
}
.lici-title { font-family:var(--mono); font-size:.75rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text); }

/* ── SCALING ── */
/* Base para desktop/DeX */
html { font-size: 16px; }

/* DeX / TV 1080p */
@media screen and (min-width: 1600px) {
  html { font-size: 18px; }
  .rate-val   { font-size: 2.3rem !important; }
  .chart-svg  { height: 52px !important; }
}

/* DeX / TV 4K */
@media screen and (min-width: 2400px) {
  html { font-size: 24px; }
  .rate-val   { font-size: 3rem !important; }
  .chart-svg  { height: 70px !important; }
  .bond-table td { font-size: 1.2rem !important; }
  .pf-table td   { font-size: 1.1rem !important; }
  .db-table td   { font-size: 1.1rem !important; }
}
</style>
</head>
<body>

<div class="main">

  <!-- ── FILA 1 ── -->

  <!-- MEP -->
  <div class="card" style="animation-delay:.04s">
    <div class="rate-wrap">
      <div class="rate-name">💱 Dólar MEP</div>
      <div class="rate-val-row">
        <div class="rate-val green" id="mep-val">—</div>
        <div class="rate-chg" id="mep-chg"></div>
      </div>
    </div>
    <div class="chart-wrap">
      <svg class="chart-svg" id="chart-mep" viewBox="0 0 300 44" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- CCL -->
  <div class="card" style="animation-delay:.07s">
    <div class="rate-wrap">
      <div class="rate-name">💵 Dólar CCL</div>
      <div class="rate-val-row">
        <div class="rate-val blue" id="ccl-val">—</div>
        <div class="rate-chg" id="ccl-chg"></div>
      </div>
    </div>
    <div class="chart-wrap">
      <svg class="chart-svg" id="chart-ccl" viewBox="0 0 300 44" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- TAMAR -->
  <div class="card" style="animation-delay:.10s">
    <div class="rate-wrap">
      <div class="rate-name">📊 Tasa TAMAR</div>
      <div class="rate-val-row">
        <div class="rate-val amber" id="tamar-val">—</div>
        <div class="rate-chg" id="tamar-chg"></div>
      </div>
      <div class="rate-date" id="tamar-date">—</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart-svg" id="chart-tamar" viewBox="0 0 300 44" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- LICI MECON — col 4 fila 1 -->
  <div class="card card-lici" style="animation-delay:.13s">
    <div class="lici-header">
      <div class="lici-title">📋 Lici MECON</div>
    </div>
    <div class="lici-dates">
      <div class="lici-cell">
        <div class="lici-val" id="lici-recepcion">—</div>
      </div>
      <div class="lici-cell liq">
        <div class="lici-val" id="lici-liquidacion">—</div>
      </div>
    </div>
  </div>

  <!-- ── FILA 2+3: BONOS (span 2 rows) + PF/DB (cols 4-5) ── -->

  <!-- TASA FIJA — 1col × 2 rows -->
  <div class="card card-tf" style="animation-delay:.19s">
    <div class="bond-label"><span class="live-dot"></span>📈 Tasa Fija</div>
    <div class="bond-wrap">
      <table class="bond-table" id="tbl-tasafija"></table>
    </div>
  </div>

  <!-- CER — 1col × 2 rows -->
  <div class="card card-cer" style="animation-delay:.22s">
    <div class="bond-label"><span class="live-dot"></span>📊 CER</div>
    <div class="bond-wrap">
      <table class="bond-table" id="tbl-cer"></table>
    </div>
  </div>

  <!-- HARD DÓLAR — 1col × 2 rows -->
  <div class="card card-hd" style="animation-delay:.25s">
    <div class="bond-label"><span class="live-dot"></span>💵 Hard Dólar</div>
    <div class="bond-wrap">
      <table class="bond-table" id="tbl-hardusd"></table>
    </div>
  </div>

  <!-- PLAZO FIJO — col 4 fila 2 -->
  <div class="card card-pf" style="animation-delay:.28s">
    <div class="section-label">💰 Plazo Fijo Web · no clientes · TNA 30 días</div>
    <div class="pf-wrap">
      <table class="pf-table" id="tbl-pf"></table>
    </div>
  </div>

  <!-- DOLAR BANCOS — col 4 fila 3 -->
  <div class="card card-db" style="animation-delay:.31s">
    <div class="section-label">🏦 Dólar Bancos · precio vendedor</div>
    <div class="db-wrap">
      <table class="db-table" id="tbl-db"></table>
    </div>
  </div>

</div>

<!-- TICKER + RELOJ -->
<div class="ticker-band">
  <div class="ticker-top"></div>
  <div class="ticker-inner">
    <div class="ticker-left">
      <div class="ticker-tag">
        <span class="live-dot"></span>
        MERVAL
      </div>
      <div class="clock" id="clock">—</div>
    </div>
    <div class="ticker-track">
      <div class="ticker-scroll" id="ticker-scroll"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

function fmt2(v) { return v.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtP(v) { return fmt2(v)+'%'; }
function rnd(v,s=.003){ return +(v*(1+(Math.random()-.5)*s)).toFixed(2); }
function genHist(base,n=30,vol=.007){ const a=[base]; for(let i=1;i<n;i++) a.push(+(a[i-1]*(1+(Math.random()-.5)*vol)).toFixed(2)); return a; }

// ── CSV URLs ──
const CSV_BONDS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDDCPaFWrl0LmClbajiHvYkeqbpczciXXnQV8VhWJ2QfMEhHo0tQGHpQFdN1UtFmGO--i2__OnSF8I/pub?gid=0&single=true&output=csv';
const CSV_FLUJOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUp-XJ7rx8hw0j_Rqy7RHrqCBwqwUxgH_BZQ6RmSY2sfXNHd7Yvb2vlLCYabemODWaCLdBoQ2kxCTW/pub?gid=0&single=true&output=csv';
const API_STOCKS    = '/api/stocks';
const API_BONDS     = '/api/bonds';
const API_TAMAR     = '/api/tamar';
const API_PF        = '/api/bcra-pf';
const API_DB        = '/api/dolar-bancos';
const API_LICI      = '/api/lici';
const API_HISTORICO = '/api/historico';

// ── CSV PARSER ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g,''));
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/\r/g,''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

// ── CALC TNA/TIR (Fija y CER) ──
function calcFijaCer(row, precio) {
  const vpv   = parseFloat(row.VPV)   || 0;
  const plazo = parseFloat(row.Plazo) || 1;
  if (!precio || !vpv) return { tna: null, tir: null };
  const tna = ((vpv - precio) / precio / plazo * 365) * 100;
  const tir = (Math.pow(vpv / precio, 365 / plazo) - 1) * 100;
  return { tna: +tna.toFixed(2), tir: +tir.toFixed(2) };
}

// ── CALC TIR/MD (Hard Dólar) por flujos ──
function calcHardUsd(ticker, precio, flujos) {
  const today = new Date();
  const flows = flujos
    .filter(f => f.Ticker === ticker && new Date(f.Fecha) > today)
    .map(f => ({ t: (new Date(f.Fecha) - today) / (365.25 * 86400000), cf: parseFloat(f.Flujo) || 0 }))
    .filter(f => f.cf > 0);

  if (!flows.length || !precio) return { tir: null, md: null };

  // Newton-Raphson TIR
  let r = 0.10;
  for (let i = 0; i < 50; i++) {
    let pv = 0, dpv = 0;
    flows.forEach(({ t, cf }) => {
      const disc = cf / Math.pow(1 + r, t);
      pv  += disc;
      dpv -= t * disc / (1 + r);
    });
    const f  = pv - precio;
    const df = dpv;
    if (Math.abs(df) < 1e-12) break;
    const nr = r - f / df;
    if (Math.abs(nr - r) < 1e-8) { r = nr; break; }
    r = nr;
  }

  // Duration Modificada
  let sumPV = 0, sumWt = 0;
  flows.forEach(({ t, cf }) => {
    const pv = cf / Math.pow(1 + r, t);
    sumPV += pv;
    sumWt += t * pv;
  });
  const duration = sumWt / sumPV;
  const md = duration / (1 + r);

  return { tir: +(r * 100).toFixed(2), md: +md.toFixed(2) };
}

function fmtPlazo(fechaStr) {
  if (!fechaStr) return '—';
  const d = new Date(fechaStr);
  if (isNaN(d)) return fechaStr;
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${meses[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`;
}

function drawChart(id,data,color){
  const svg=$(id); if(!svg) return; svg.innerHTML='';
  const W=300,H=44,p={t:2,b:2,l:1,r:1};
  const mn=Math.min(...data)*.999, mx=Math.max(...data)*1.001;
  const x=i=>p.l+(i/(data.length-1))*(W-p.l-p.r);
  const y=v=>p.t+(1-(v-mn)/(mx-mn))*(H-p.t-p.b);
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const g=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  g.setAttribute('id',`g${id}`);g.setAttribute('x1','0');g.setAttribute('y1','0');g.setAttribute('x2','0');g.setAttribute('y2','1');
  [[0,.2],[1,0]].forEach(([o,op])=>{const s=document.createElementNS('http://www.w3.org/2000/svg','stop');s.setAttribute('offset',`${o*100}%`);s.setAttribute('stop-color',color);s.setAttribute('stop-opacity',op);g.appendChild(s);});
  defs.appendChild(g);svg.appendChild(defs);
  let aD=`M${x(0)},${H-p.b} L${x(0)},${y(data[0])}`;
  data.forEach((v,i)=>{aD+=` L${x(i)},${y(v)}`;});
  aD+=` L${x(data.length-1)},${H-p.b} Z`;
  const area=document.createElementNS('http://www.w3.org/2000/svg','path');
  area.setAttribute('d',aD);area.setAttribute('fill',`url(#g${id})`);svg.appendChild(area);
  let lD=`M${x(0)},${y(data[0])}`;
  data.forEach((v,i)=>{if(i>0)lD+=` L${x(i)},${y(v)}`;});
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',lD);line.setAttribute('fill','none');line.setAttribute('stroke',color);line.setAttribute('stroke-width','1.5');line.setAttribute('stroke-linejoin','round');svg.appendChild(line);
  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',x(data.length-1));dot.setAttribute('cy',y(data[data.length-1]));dot.setAttribute('r','2.5');dot.setAttribute('fill',color);svg.appendChild(dot);
}

    stocks = data
      .filter(s => s.c > 0 && !s.symbol.endsWith('D') && !s.symbol.endsWith('5'))
      .map(s => ({ s: s.symbol, c: s.c, p: s.pct_change || 0, cur: s.c }));
  } catch(e) { console.warn('Stocks fetch error', e); }

  renderTicker();

  // MEP/CCL desde bonds live (sobre el histórico ya cargado)
  await fetchMepCcl();

  drawChart('chart-mep',  mepHist,   '#00c896');
  drawChart('chart-ccl',  cclHist,   '#3d8ef0');
  drawChart('chart-tamar',tamarHist, '#f0a03d');
}

init();

// Refresh every 10s — bonds, stocks, MEP/CCL
setInterval(async () => {
  await Promise.all([ fetchLivePrices(), fetchMepCcl() ]);
  buildBondData();
  updateBonds();
  stocks = stocks.map(s=>({...s, cur: livePrices[s.s] || rnd(s.cur,.002)}));
  renderTicker();
}, 10000);

// Refresh TAMAR y PF cada 5 minutos
setInterval(async () => {
  await Promise.all([ fetchTamar(), fetchPF() ]);
  renderRate('tamar-val','tamar-chg',tamarCur,tamarCur,true);
  drawChart('chart-tamar', tamarHist, '#f0a03d');
  renderPF();
}, 300000);

setInterval(updateClock, 1000);
</script>
</body>
</html>
